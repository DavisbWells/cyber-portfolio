<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login — Cyber Ops</title>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.supabase.co; frame-ancestors 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    /* Login page specific layout */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
    }
    .login-logo {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
      text-align: center;
    }
    .login-logo span { color: var(--green); }
    .login-card h1 {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }
    .login-sub {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }
    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      padding: 10px 14px;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--green-border);
      box-shadow: 0 0 0 3px rgba(0,255,136,0.08);
    }
    .form-group input::placeholder { color: var(--text-dim); }
    .login-error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 0.85rem;
      color: var(--red);
      margin-bottom: 1.25rem;
      display: none;
    }
    .login-error.visible { display: block; }
    .btn-login {
      width: 100%;
      justify-content: center;
      margin-top: 0.5rem;
    }
    .login-back {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .login-back a { color: var(--text-muted); }
    .login-back a:hover { color: var(--green); }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <span>[</span>Cyber Ops<span>]</span> — Admin
      </div>

      <h1>Sign In</h1>
      <div class="login-sub">$ sudo admin --authenticate</div>

      <div class="login-error" id="login-error" role="alert" aria-live="polite"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required>
        </div>

        <button type="submit" class="btn btn-primary btn-login" id="submit-btn">
          Sign In
        </button>
      </form>

      <div class="login-back">
        <a href="../index.html">&#8592; Back to portfolio</a>
      </div>

    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script>
    // Redirect to admin if already logged in
    if (SupabaseClient.isAuthenticated()) {
      window.location.href = 'admin.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const errorEl   = document.getElementById('login-error');
      const submitBtn = document.getElementById('submit-btn');

      // Basic client-side validation
      if (!email || !password) {
        errorEl.textContent = 'Please enter your email and password.';
        errorEl.classList.add('visible');
        return;
      }

      errorEl.classList.remove('visible');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        await SupabaseClient.signIn(email, password);
        window.location.href = 'admin.html';
      } catch (err) {
        errorEl.textContent = err.message || 'Login failed. Check your credentials.';
        errorEl.classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
        document.getElementById('password').value = '';
      }
    });
  </script>

</body>
</html>
