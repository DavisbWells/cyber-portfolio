<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Cyber Ops</title>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.supabase.co; frame-ancestors 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    /* ── Admin layout ───────────────────────────── */
    .admin-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-bar-logo {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .admin-bar-logo span { color: var(--green); }
    .admin-bar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .admin-user-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .admin-user-label strong { color: var(--green); }

    .admin-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .admin-header {
      margin-bottom: 2rem;
    }
    .admin-header h1 { font-size: 1.75rem; margin-bottom: 0.25rem; }
    .admin-header p {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ── Tabs ───────────────────────────────────── */
    .admin-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .admin-tab {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      background: none;
      border: none;
      padding: 0.6rem 1.25rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color var(--t-fast), border-color var(--t-fast);
    }
    .admin-tab:hover { color: var(--text-primary); }
    .admin-tab.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    /* ── Panels ─────────────────────────────────── */
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }

    .admin-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .admin-panel-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* ── Table ──────────────────────────────────── */
    .admin-table-wrap { overflow-x: auto; }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .admin-table th {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-align: left;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .admin-table td {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-secondary);
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .admin-table tr:hover td { background: rgba(255,255,255,0.02); }
    .admin-actions { display: flex; gap: 0.5rem; white-space: nowrap; }

    .admin-loading,
    .admin-empty  { color: var(--text-muted); font-family: var(--font-mono); font-size: 0.85rem; padding: 2rem 0; }
    .admin-error  { color: var(--red); font-size: 0.85rem; padding: 2rem 0; }

    /* ── Modal overlay ───────────────────────────── */
    .admin-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-y: auto;
    }
    .admin-modal.open { display: flex; }
    .modal-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      width: 100%;
      max-width: 560px;
      margin: auto;
    }
    .modal-card h2 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
    }

    /* ── Form fields ─────────────────────────────── */
    .form-group {
      margin-bottom: 1.1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      padding: 8px 12px;
      outline: none;
      transition: border-color var(--t-fast);
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--green-border);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--text-dim); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group select option { background: var(--bg-card); }
    .form-group-inline {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .form-group-inline label {
      margin: 0;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .form-group-inline input[type="checkbox"] {
      width: auto;
      accent-color: var(--green);
    }
    .form-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    /* ── Toast ───────────────────────────────────── */
    .admin-toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 2000;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      max-width: 340px;
    }
    .admin-toast.visible { opacity: 1; transform: translateY(0); }
    .admin-toast-success { background: var(--green-dim); border: 1px solid var(--green-border); color: var(--green); }
    .admin-toast-error   { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }

    /* ── View site link ──────────────────────────── */
    .view-site-link {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
    }
    .view-site-link:hover { color: var(--green); }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="admin-bar">
    <div class="admin-bar-logo">
      <span>[</span>Cyber Ops<span>]</span> — Admin Panel
    </div>
    <div class="admin-bar-right">
      <a href="../index.html" class="view-site-link">&#8599; View site</a>
      <div class="admin-user-label">Logged in as <strong id="admin-user"></strong></div>
      <button class="btn btn-sm btn-ghost" id="signout-btn">Sign Out</button>
    </div>
  </div>

  <div class="admin-wrap">
    <div class="admin-header">
      <h1>Content Manager</h1>
      <p>$ manage --portfolio --live-sync</p>
    </div>

    <!-- Tabs -->
    <div class="admin-tabs" role="tablist">
      <button class="admin-tab active" role="tab" data-panel="panel-projects" aria-selected="true">Projects</button>
      <button class="admin-tab" role="tab" data-panel="panel-labs" aria-selected="false">Labs</button>
      <button class="admin-tab" role="tab" data-panel="panel-certs" aria-selected="false">Certifications</button>
    </div>

    <!-- Projects panel -->
    <div id="panel-projects" class="admin-panel active" role="tabpanel">
      <div class="admin-panel-header">
        <div class="admin-panel-title">Projects</div>
        <button class="btn btn-primary btn-sm add-new-btn" data-table="projects">+ Add Project</button>
      </div>
      <div class="admin-table-wrap">
        <p class="admin-loading">Loading...</p>
      </div>
    </div>

    <!-- Labs panel -->
    <div id="panel-labs" class="admin-panel" role="tabpanel">
      <div class="admin-panel-header">
        <div class="admin-panel-title">Lab Writeups</div>
        <button class="btn btn-primary btn-sm add-new-btn" data-table="labs">+ Add Lab</button>
      </div>
      <div class="admin-table-wrap">
        <p class="admin-loading">Loading...</p>
      </div>
    </div>

    <!-- Certifications panel -->
    <div id="panel-certs" class="admin-panel" role="tabpanel">
      <div class="admin-panel-header">
        <div class="admin-panel-title">Certifications</div>
        <button class="btn btn-primary btn-sm add-new-btn" data-table="certifications">+ Add Certification</button>
      </div>
      <div class="admin-table-wrap">
        <p class="admin-loading">Loading...</p>
      </div>
    </div>

  </div>

  <!-- Add / Edit modal -->
  <div id="admin-modal" class="admin-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <h2 id="modal-title">Add Entry</h2>
      <form id="modal-form" novalidate></form>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/admin.js"></script>

</body>
</html>
